apiVersion: apps/v1
kind: Deployment
metadata:
  name: service
  labels:
    app: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service
  template:
    metadata:
      labels:
        app: service
    spec:
      volumes:
        # Local machine folder mounted into Pod
        - name: local-code
          hostPath:
            path: /node_workspace/service
            type: Directory

        # Writable workspace
        - name: workspace-volume
          emptyDir: {}

      initContainers:
        - name: copy-local-code
          image: busybox
          command: ["/bin/sh", "-c"]
          args:
            - >
              cp -r /config/* /workspace/ &&
              echo "Code copied from local machine";
          volumeMounts:
            - name: local-code
              mountPath: /config

            - name: workspace-volume
              mountPath: /workspace

      containers:
        - name: runner
          image: meeran666/ide_image
          ports:
            - containerPort: 3003
            - containerPort: 3000
          volumeMounts:
            - name: workspace-volume
              mountPath: /workspace
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "1Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: service
spec:
  selector:
    app: service
  ports:
    - protocol: TCP
      name: ws
      port: 3003
      targetPort: 3003
    - protocol: TCP
      name: user
      port: 3000
      targetPort: 3000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: service
spec:
  ingressClassName: nginx
  rules:
    - host: service.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: service
                port:
                  number: 3003

    - host: service.moviemania.wiki
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: service
                port:
                  number: 3000