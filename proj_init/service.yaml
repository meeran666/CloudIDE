apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_name
  labels:
    app: service_name
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service_name
  template:
    metadata:
      labels:
        app: service_name
    spec:
      volumes:
        - name: workspace-volume
          emptyDir: {}

        - name: code-volume
          configMap:
            name: service-code

      initContainers:
        - name: copy-local-code
          image: busybox
          command: ["/bin/sh", "-c"]
          args:
            - >
              cp -r /config/* /workspace/ &&
              echo "Code copied from ConfigMap";
          volumeMounts:
            - name: code-volume
              mountPath: /config

            - name: workspace-volume
              mountPath: /workspace

      containers:
        - name: runner
          image: meeran666/ide_image
          ports:
            - containerPort: 3003
            - containerPort: 3000
          volumeMounts:
            - name: workspace-volume
              mountPath: /workspace
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: service_name
spec:
  selector:
    app: service_name
  ports:
    - protocol: TCP
      name: ws
      port: 3003
      targetPort: 3003
    - protocol: TCP
      name: user
      port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: service_name
spec:
  ingressClassName: nginx
  rules:
  - host: service_name.moviemania.wiki
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: service_name
            port:
              number: 3003
  - host: service_name.autogpt-cloud.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: service_name
            port:
              number: 3000 
